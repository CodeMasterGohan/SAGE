stages:
  - test

playwright:
  stage: test
  image: mcr.microsoft.com/playwright:v1.45.0-jammy
  parallel:
    matrix:
      - PROJECT: ['chromium', 'firefox', 'webkit']
  script:
    - npm ci
    - npx playwright test --project=$PROJECT
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
